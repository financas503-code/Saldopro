<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Saldo + Pró - Finança Descomplicada</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

<style>
:root {
  --bg-color: #000000;
  --card-bg: #111111;
  --border-color: #222222;
  --text-main: #ffffff;
  --text-muted: #aaaaaa;
  --accent-orange: #FF6600;
  --accent-green: #10b981;
  --accent-red: #f43f5e;
  --safe-area-bottom: env(safe-area-inset-bottom, 20px);
}

* { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg-color); color: var(--text-main); padding: 10px; padding-bottom: 100px; }
.container { max-width: 600px; margin: auto; }

/* LOGIN SCREEN */
#auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; max-width: 450px; margin: auto; }
.login-title { color: var(--accent-orange); font-size: 2.5rem; font-weight: bold; margin-bottom: 30px; letter-spacing: 3px; text-transform: uppercase; }
.login-card { background: var(--card-bg); width: 100%; padding: 30px; border-radius: 20px; border: 1px solid var(--border-color); }
.login-card h2 { margin-bottom: 20px; font-weight: bold; font-size: 1.5rem; }
.grid-login { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }

input, select { width: 100%; height: 48px; padding: 0 12px; margin-bottom: 8px; border-radius: 12px; border: 1px solid var(--border-color); background: #1a1a1a; color: #fff; font-size: 16px; outline: none; }
button { height: 48px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
button:active { opacity: 0.7; }

.btn-primary { background: var(--accent-orange); color: #000; width: 100%; }
.btn-secondary { background: #222; color: #fff; width: 100%; }
.btn-danger { background: var(--accent-red); color: white; width: 100%; }

/* HEADER & APP */
.header { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--border-color); position: relative; margin-bottom: 15px; }
h1 { color: var(--accent-orange); font-size: 2rem; text-transform: uppercase; letter-spacing: 3px; }
.btn-privacy { position: absolute; right: 10px; top: 25px; background: none; border: none; font-size: 1.5rem; cursor: pointer; }
.blur-active { filter: blur(8px); }
.hidden { display: none !important; }

.card { background: var(--card-bg); padding: 18px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border-color); }
.card h3 { text-align: center; color: var(--accent-orange); font-size: 1.2rem; margin-bottom: 15px; }
.dash-item { padding: 12px; border-radius: 15px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.dash-val { font-size: 1.1rem; font-weight: bold; }

.tabs { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #080808; border-top: 1px solid var(--border-color); padding-bottom: var(--safe-area-bottom); z-index: 1000; }
.tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-size: 0.8rem; color: var(--text-muted); }
.tab.active { color: var(--accent-orange); border-top: 2px solid var(--accent-orange); }

.transacao { padding: 15px; margin: 8px 0; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; background: #080808; border: 1px solid #1a1a1a; }
.receitaItem { border-left: 4px solid var(--accent-green); }
.despesaItem { border-left: 4px solid var(--accent-red); }

.transacao-actions { display: flex; gap: 5px; }
.btn-edit { background: #3b82f6; color: white; border: none; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
.btn-delete { background: var(--accent-red); color: white; border: none; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }

/* LOADING & ALERTS */
.loading { display: inline-block; width: 12px; height: 12px; border: 2px solid #ccc; border-top: 2px solid var(--accent-orange); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.alert-msg { padding: 12px; margin-bottom: 10px; border-radius: 8px; text-align: center; font-weight: bold; }
.alert-success { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); }
.alert-error { background: rgba(244, 63, 94, 0.2); color: var(--accent-red); }

/* GRÁFICOS */
.graficos-container { display: grid; grid-template-columns: 1fr; gap: 20px; }
canvas { max-height: 400px !important; width: 100% !important; }

/* MODAL */
.modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); overflow-y: auto; }
.modal.show { display: flex; align-items: center; justify-content: center; }
.modal-content { background: var(--card-bg); padding: 20px; border-radius: 15px; max-width: 500px; width: 90%; border: 1px solid var(--border-color); }
.modal-content h2 { color: var(--accent-orange); margin-bottom: 15px; }
.modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
</style>
</head>

<body>

<div id="auth-screen">
    <div class="login-title">SALDO + PRÓ</div>
    <div class="login-card">
        <h2>Entrar</h2>
        <div id="auth-alert"></div>
        <input type="email" id="auth-email" placeholder="E-mail">
        <input type="password" id="auth-password" placeholder="Senha">
        <button class="btn-primary" onclick="handleAuth('login')" id="btn-login">Acessar Conta</button>
        <div class="grid-login">
            <button class="btn-secondary" onclick="handleAuth('signup')" id="btn-signup">Criar Conta</button>
            <button class="btn-secondary" onclick="handleAuth('reset')" id="btn-reset">Esqueci Senha</button>
        </div>
    </div>
</div>

<div id="main-app" class="container hidden">
    <div class="header">
        <h1>Saldo + Pró</h1>
        <button class="btn-privacy" onclick="togglePrivacidade()" id="btnPrivacy">👁️</button>
    </div>

    <div id="home" class="page">
        <div class="card">
            <h3>Filtro & Meta</h3>
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                <input type="month" id="mesInicio" onchange="atualizar()">
                <input type="month" id="mesFim" onchange="atualizar()">
            </div>
            <input id="metaValor" type="tel" placeholder="Meta de sobra (R$)">
            <button class="btn-primary" onclick="salvarMeta()">Salvar Meta</button>
            <div style="text-align: center; font-size: 0.9rem; color: var(--accent-orange); margin-top: 10px;" id="metaAtual"></div>
        </div>

        <div class="card">
            <div class="dash-item"><span>Entradas</span><span id="resumoReceitas" class="dash-val" style="color: var(--accent-green)">R$ 0,00</span></div>
            <div class="dash-item"><span>Saídas</span><span id="resumoDespesas" class="dash-val" style="color: var(--accent-red)">R$ 0,00</span></div>
            <div class="dash-item"><span>Saldo</span><span id="resumoSaldo" class="dash-val" style="color: var(--accent-orange)">R$ 0,00</span></div>
            <div id="metaStatus" style="text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-top: 10px;"></div>
        </div>

        <div class="card">
            <h3>Lançamento</h3>
            <select id="tipo"><option value="receita">Receita</option><option value="despesa" selected>Despesa</option></select>
            <input id="descricao" placeholder="Descrição">
            <input id="valor" type="tel" placeholder="R$ 0,00">
            <input id="data" type="date">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <select id="conta"></select>
                <select id="categoria"></select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;">
                <select id="tipoParcelamento">
                    <option value="fixo">Compra Fixa</option>
                    <option value="parcelado">Parcelado</option>
                </select>
                <input id="parcelas" type="number" value="1" min="1" max="12" placeholder="Parcelas (até 12)">
            </div>
            <select id="tipoParcela" style="display:none;"><option value="total">Valor Total</option><option value="mensal">Valor Mensal</option></select>
            <button class="btn-primary" onclick="add()">Adicionar Lançamento</button>
        </div>
        <div id="listaLancamentos"></div>
    </div>

    <div id="graficos" class="page hidden">
        <div class="card">
            <h3>Filtro de Datas</h3>
            <div style="display: flex; gap: 8px;">
                <input type="month" id="mesInicioGraf" onchange="desenharGraficos()">
                <input type="month" id="mesFimGraf" onchange="desenharGraficos()">
            </div>
        </div>
        <div class="graficos-container">
            <div class="card"><h3>Distribuição de Despesas</h3><div style="position: relative; height: 350px;"><canvas id="grafico2"></canvas></div></div>
            <div class="card"><h3>Balanço Mensal</h3><div style="position: relative; height: 350px;"><canvas id="grafico1"></canvas></div></div>
        </div>
    </div>

    <div id="config" class="page hidden">
        <div class="card">
            <h3>Contas</h3>
            <div style="display:flex; gap:5px; margin-bottom: 8px;">
                <input id="novaConta" placeholder="Banco" style="flex:1;">
                <select id="tipoConta" style="flex:1;">
                    <option>Corrente</option>
                    <option>Crédito</option>
                    <option>Débito</option>
                    <option>Poupança</option>
                    <option>Investimento</option>
                    <option>Dinheiro</option>
                </select>
            </div>
            <button class="btn-primary" onclick="addConfig('contas')">Adicionar Conta</button>
            <div id="listaAdminContas" style="margin-top:10px"></div>
        </div>
        
        <div class="card">
            <h3>Categorias</h3>
            <div style="display:flex; gap:5px; margin-bottom: 8px;">
                <input id="novaCategoria" placeholder="Nova categoria" style="flex:1;">
            </div>
            <button class="btn-primary" onclick="addConfig('categorias')">Adicionar Categoria</button>
            <div id="listaAdminCategorias" style="margin-top:10px"></div>
        </div>

        <button class="btn-danger" onclick="handleLogout()" style="margin-top: 20px;">Sair da Conta</button>
    </div>

    <nav class="tabs">
        <div class="tab active" onclick="trocarAba('home',this)">Painel</div>
        <div class="tab" onclick="trocarAba('graficos',this)">Gráficos</div>
        <div class="tab" onclick="trocarAba('config',this)">Ajustes</div>
    </nav>
</div>

<!-- MODAL DE EDIÇÃO -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h2>Editar Lançamento</h2>
        <select id="editTipo"><option value="receita">Receita</option><option value="despesa">Despesa</option></select>
        <input id="editDescricao" placeholder="Descrição">
        <input id="editValor" type="tel" placeholder="R$ 0,00">
        <input id="editData" type="date">
        <select id="editConta"></select>
        <select id="editCategoria"></select>
        <div id="editParcelasInfo" style="padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;">
            <div>
                <label style="font-size: 0.8rem; color: var(--text-muted);">Aplicar a:</label>
                <select id="editOpcaoParcela">
                    <option value="atual">Apenas este</option>
                    <option value="futuros">Este e futuros</option>
                    <option value="todos">Todos da série</option>
                </select>
            </div>
            <div></div>
        </div>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
            <button class="btn-primary" onclick="salvarEdicao()">Salvar</button>
        </div>
    </div>
</div>

<!-- MODAL DE CONFIRMAÇÃO DE PARCELAMENTO -->
<div id="modalParcelas" class="modal">
    <div class="modal-content">
        <h2>Confirmar Parcelamento</h2>
        <div id="parcelasInfo" style="padding: 15px; background: rgba(255,165,0,0.1); border-radius: 8px; border-left: 4px solid var(--accent-orange);"></div>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="fecharModalParcelas()">Cancelar</button>
            <button class="btn-primary" onclick="confirmarParcelamento()">Confirmar</button>
        </div>
    </div>
</div>

<script>
// ===== CONFIGURAÇÃO SUPABASE =====
const SUPABASE_URL = 'https://mjgxiqjsmfnmfkvtbdka.supabase.co';
const SUPABASE_KEY = 'sb_publishable_SJAXu2tYMNFAvG5KNj4E7w_DW-oae1f';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== VARIÁVEIS GLOBAIS =====
let transacoes = [];
let nuvemMetas = {};
let contas = JSON.parse(localStorage.getItem('contas')) || [{nome:'Itaú', tipo:'Corrente'},{nome:'Nubank', tipo:'Crédito'}];
let categorias = JSON.parse(localStorage.getItem('categorias')) || ['Mercado', 'Transporte', 'Casa', 'Lazer'];
let userSession = null;
let transacaoEmEdicao = null;
let parcelamentoPendente = null;
let charts = {};

// ===== FUNÇÕES DE ALERT =====
function showAlert(msg, type = 'success') {
    const alertDiv = document.getElementById('auth-alert') || document.createElement('div');
    alertDiv.id = 'auth-alert';
    alertDiv.className = `alert-msg alert-${type}`;
    alertDiv.innerText = msg;
    
    if(!document.getElementById('auth-alert')) {
        document.querySelector('.login-card').insertBefore(alertDiv, document.querySelector('.login-card h2').nextElementSibling);
    }
    
    setTimeout(() => alertDiv.remove(), 4000);
}

// ===== AUTENTICAÇÃO =====
async function handleAuth(type) {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;

    if(!email) {
        showAlert('❌ Digite o e-mail', 'error');
        return;
    }

    if(type === 'reset') {
        try {
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
            if(error) {
                showAlert('❌ Erro: ' + error.message, 'error');
            } else {
                showAlert('✅ Link de reset enviado para ' + email, 'success');
            }
        } catch(e) {
            showAlert('❌ Erro ao enviar link: ' + e.message, 'error');
        }
        return;
    }

    if(!password) {
        showAlert('❌ Digite a senha', 'error');
        return;
    }

    try {
        const btn = event.target;
        btn.disabled = true;
        btn.innerHTML = '<span class="loading"></span>';

        if(type === 'signup') {
            const { data: existingUsers } = await supabaseClient.auth.admin.listUsers();
            const emailExists = existingUsers?.users?.some(u => u.email === email);
            
            if(emailExists) {
                showAlert('❌ Este e-mail já está cadastrado! Use o botão "Acessar Conta"', 'error');
                btn.disabled = false;
                btn.innerText = 'Criar Conta';
                return;
            }
        }

        const { data, error } = (type === 'login') 
            ? await supabaseClient.auth.signInWithPassword({email, password})
            : await supabaseClient.auth.signUp({email, password});

        btn.disabled = false;
        btn.innerText = type === 'login' ? 'Acessar Conta' : 'Criar Conta';
        
        if(error) {
            if(error.message.includes('Invalid login credentials')) {
                showAlert('❌ E-mail ou senha incorretos', 'error');
            } else if(error.message.includes('already registered')) {
                showAlert('❌ Este e-mail já está cadastrado! Use o botão "Acessar Conta"', 'error');
            } else {
                showAlert('❌ ' + error.message, 'error');
            }
        } else if(type === 'signup') {
            showAlert('✅ Conta criada! Verifique seu e-mail', 'success');
        }
    } catch(e) {
        showAlert('❌ Erro: ' + e.message, 'error');
        btn.disabled = false;
        btn.innerText = type === 'login' ? 'Acessar Conta' : 'Criar Conta';
    }
}

async function handleLogout() {
    if(!confirm('Tem certeza que deseja sair?')) return;
    await supabaseClient.auth.signOut();
    window.location.reload();
}

// ===== OBSERVADOR DE AUTENTICAÇÃO =====
supabaseClient.auth.onAuthStateChange((event, session) => {
    userSession = session;
    if(session) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('btnPrivacy').style.display = 'block';
        carregarDados();
    } else {
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('main-app').classList.add('hidden');
    }
});

// ===== CARREGAMENTO DE DADOS =====
async function carregarDados() {
    if(!userSession) {
        console.error('Sem sessão de usuário');
        return;
    }

    try {
        const { data: tData, error: tError } = await supabaseClient
            .from('transacoes')
            .select('*')
            .eq('user_id', userSession.user.id)
            .order('data', {ascending: false});

        const { data: mData, error: mError } = await supabaseClient
            .from('metas')
            .select('*')
            .eq('user_id', userSession.user.id);

        if(tError) console.error('Erro ao carregar transações:', tError);
        if(mError) console.error('Erro ao carregar metas:', mError);

        transacoes = tData || [];
        nuvemMetas = {};
        if(mData) {
            mData.forEach(m => nuvemMetas[m.mes] = m.valor);
        }

        atualizar();
    } catch(e) {
        console.error('Erro ao carregar dados:', e);
    }
}

// ===== PARCELAMENTO =====
document.getElementById('tipoParcelamento').addEventListener('change', function() {
    const parcelas = document.getElementById('parcelas');
    const tipoParcela = document.getElementById('tipoParcela');
    if(this.value === 'parcelado') {
        parcelas.style.display = 'block';
        tipoParcela.style.display = 'block';
    } else {
        parcelas.value = '1';
        parcelas.style.display = 'none';
        tipoParcela.style.display = 'none';
    }
});

// ===== ADICIONAR TRANSAÇÃO =====
async function add() {
    const v = parseMoeda(document.getElementById('valor').value);
    const d = document.getElementById('data').value;
    const desc = document.getElementById('descricao').value.trim();
    const c = document.getElementById('conta').value;
    const cat = document.getElementById('categoria').value;
    const tipo = document.getElementById('tipoParcelamento').value;
    const p = parseInt(document.getElementById('parcelas').value) || 1;

    if(!v || !d || !desc || !c || !cat) {
        alert('❌ Atenção: Preencha todos os campos!');
        return;
    }

    if(tipo === 'parcelado' && (p < 2 || p > 12)) {
        alert('❌ Parcelas deve ser entre 2 e 12!');
        return;
    }

    // Mostrar confirmação de parcelamento
    if(tipo === 'parcelado' && p > 1) {
        const valorParcela = v / p;
        let parcelasTexto = '';
        let [ano, mes, dia] = d.split('-').map(Number);
        
        for(let i = 0; i < p; i++) {
            let dataParc = new Date(ano, mes - 1 + i, dia);
            parcelasTexto += `${i+1}ª parcela: ${format(valorParcela)} - ${dataParc.toLocaleDateString('pt-BR')}<br>`;
        }

        document.getElementById('parcelasInfo').innerHTML = `
            <strong>${desc}</strong><br>
            Valor total: <strong>${format(v)}</strong><br>
            ${p}x de <strong>${format(valorParcela)}</strong><br><br>
            <small>${parcelasTexto}</small>
        `;
        
        parcelamentoPendente = {v, d, desc, c, cat, p, tipo};
        document.getElementById('modalParcelas').classList.add('show');
        return;
    }

    await executarAdicao(v, d, desc, c, cat, p, tipo);
}

async function confirmarParcelamento() {
    if(parcelamentoPendente) {
        await executarAdicao(parcelamentoPendente.v, parcelamentoPendente.d, parcelamentoPendente.desc, 
                           parcelamentoPendente.c, parcelamentoPendente.cat, parcelamentoPendente.p, parcelamentoPendente.tipo);
        fecharModalParcelas();
    }
}

function fecharModalParcelas() {
    document.getElementById('modalParcelas').classList.remove('show');
    parcelamentoPendente = null;
}

async function executarAdicao(v, d, desc, c, cat, p, tipo) {
    try {
        const btn = document.querySelector('.btn-primary:nth-of-type(3)');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading"></span>';

        let inserts = [];
        let [ano, mes, dia] = d.split('-').map(Number);
        let valorFinal = tipo === 'parcelado' ? v / p : v;

        const serieId = Date.now() + '-' + Math.random();

        for(let i=0; i<p; i++) {
            let dataParc = new Date(ano, mes - 1 + i, dia);
            inserts.push({
                user_id: userSession.user.id,
                tipo: document.getElementById('tipo').value,
                descricao: p > 1 ? `${desc} ${i+1}/${p}` : desc,
                valor: valorFinal,
                data: dataParc.toISOString().split('T')[0],
                conta: c,
                categoria: cat,
                serie_id: p > 1 ? serieId : null,
                parcela_numero: p > 1 ? i + 1 : null,
                parcela_total: p > 1 ? p : null
            });
        }

        const { error } = await supabaseClient.from('transacoes').insert(inserts);
        
        btn.disabled = false;
        btn.innerText = 'Adicionar Lançamento';

        if(error) {
            alert('❌ Erro ao salvar: ' + error.message);
        } else {
            document.getElementById('descricao').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('parcelas').value = '1';
            document.getElementById('tipoParcelamento').value = 'fixo';
            alert('✅ Transação(ões) salva(s) com sucesso!');
            await carregarDados();
        }
    } catch(e) {
        alert('❌ Erro: ' + e.message);
        document.querySelector('.btn-primary:nth-of-type(3)').disabled = false;
        document.querySelector('.btn-primary:nth-of-type(3)').innerText = 'Adicionar Lançamento';
    }
}

// ===== SALVAR META =====
async function salvarMeta() {
    const mes = document.getElementById('mesInicio').value;
    const v = parseMoeda(document.getElementById('metaValor').value);

    if(!mes || !v) {
        alert('❌ Selecione o mês e o valor!');
        return;
    }

    try {
        const { error } = await supabaseClient.from('metas').upsert({
            user_id: userSession.user.id,
            mes: mes,
            valor: v
        }, {onConflict: 'user_id,mes'});

        if(error) {
            alert('❌ Erro ao salvar meta: ' + error.message);
        } else {
            alert('✅ Meta salva!');
            document.getElementById('metaValor').value = '';
            await carregarDados();
        }
    } catch(e) {
        alert('❌ Erro: ' + e.message);
    }
}

// ===== EDITAR TRANSAÇÃO =====
function abrirEdicao(transacao) {
    transacaoEmEdicao = transacao;
    document.getElementById('editTipo').value = transacao.tipo;
    document.getElementById('editDescricao').value = transacao.descricao;
    document.getElementById('editValor').value = format(transacao.valor).replace(/[^\d,]/g, '').replace(',', '.');
    document.getElementById('editData').value = transacao.data;
    document.getElementById('editConta').value = transacao.conta;
    document.getElementById('editCategoria').value = transacao.categoria;
    
    // Mostrar informações de parcelamento
    if(transacao.parcela_total && transacao.parcela_total > 1) {
        document.getElementById('editParcelasInfo').innerHTML = `
            Parcela ${transacao.parcela_numero} de ${transacao.parcela_total}<br>
            <strong>Opções de edição:</strong>
        `;
        document.getElementById('editOpcaoParcela').style.display = 'block';
    } else {
        document.getElementById('editParcelasInfo').innerHTML = '';
        document.getElementById('editOpcaoParcela').style.display = 'none';
    }
    
    renderConfigs();
    
    document.getElementById('editModal').classList.add('show');
}

function fecharModal() {
    document.getElementById('editModal').classList.remove('show');
    transacaoEmEdicao = null;
}

async function salvarEdicao() {
    if(!transacaoEmEdicao) return;

    const novoValor = parseMoeda(document.getElementById('editValor').value);
    const updateData = {
        tipo: document.getElementById('editTipo').value,
        descricao: document.getElementById('editDescricao').value,
        valor: novoValor,
        data: document.getElementById('editData').value,
        conta: document.getElementById('editConta').value,
        categoria: document.getElementById('editCategoria').value
    };

    try {
        const opcao = document.getElementById('editOpcaoParcela').value;

        if(transacaoEmEdicao.parcela_total && transacaoEmEdicao.parcela_total > 1) {
            if(opcao === 'atual') {
                // Apenas esta transação
                const { error } = await supabaseClient
                    .from('transacoes')
                    .update(updateData)
                    .eq('id', transacaoEmEdicao.id);

                if(error) throw error;
            } else if(opcao === 'futuros') {
                // Esta e futuras
                const { data: futuros } = await supabaseClient
                    .from('transacoes')
                    .select('id')
                    .eq('serie_id', transacaoEmEdicao.serie_id)
                    .gte('parcela_numero', transacaoEmEdicao.parcela_numero);

                for(let t of futuros || []) {
                    await supabaseClient.from('transacoes').update(updateData).eq('id', t.id);
                }
            } else if(opcao === 'todos') {
                // Todas da série
                const { data: todos } = await supabaseClient
                    .from('transacoes')
                    .select('id')
                    .eq('serie_id', transacaoEmEdicao.serie_id);

                for(let t of todos || []) {
                    await supabaseClient.from('transacoes').update(updateData).eq('id', t.id);
                }
            }
        } else {
            // Transação sem parcelamento
            const { error } = await supabaseClient
                .from('transacoes')
                .update(updateData)
                .eq('id', transacaoEmEdicao.id);

            if(error) throw error;
        }

        alert('✅ Transação atualizada!');
        fecharModal();
        await carregarDados();
    } catch(e) {
        alert('❌ Erro: ' + e.message);
    }
}

// ===== DELETAR TRANSAÇÃO =====
async function deletarTransacao(id) {
    if(!confirm('Tem certeza que deseja deletar esta transação?')) return;

    try {
        const { error } = await supabaseClient
            .from('transacoes')
            .delete()
            .eq('id', id);

        if(error) {
            alert('❌ Erro ao deletar: ' + error.message);
        } else {
            alert('✅ Transação deletada!');
            await carregarDados();
        }
    } catch(e) {
        alert('❌ Erro: ' + e.message);
    }
}

// ===== ADICIONAR CONTA/CATEGORIA =====
async function addConfig(tipo) {
    if(tipo === 'contas') {
        const nome = document.getElementById('novaConta').value.trim();
        const tipoC = document.getElementById('tipoConta').value;
        if(!nome) return alert('❌ Digite o nome do banco');
        contas.push({nome, tipo: tipoC});
    } else if(tipo === 'categorias') {
        const nome = document.getElementById('novaCategoria').value.trim();
        if(!nome) return alert('❌ Digite a categoria');
        categorias.push(nome);
    }

    localStorage.setItem('contas', JSON.stringify(contas));
    localStorage.setItem('categorias', JSON.stringify(categorias));
    renderConfigs();
    atualizar();

    if(tipo === 'contas') document.getElementById('novaConta').value = '';
    else document.getElementById('novaCategoria').value = '';
    
    alert('✅ ' + (tipo === 'contas' ? 'Conta' : 'Categoria') + ' adicionada!');
}

// ===== ATUALIZAR INTERFACE =====
function atualizar() {
    renderConfigs();
    const dados = filtrar(transacoes);
    const lista = document.getElementById('listaLancamentos');
    lista.innerHTML = '';
    let tR = 0, tD = 0;

    dados.forEach(t => {
        let ehR = t.tipo === 'receita';
        if(ehR) tR += t.valor; else tD += t.valor;
        const dataFormatada = new Date(t.data + 'T00:00:00').toLocaleDateString('pt-BR');
        lista.innerHTML += `<div class="transacao ${ehR?'receitaItem':'despesaItem'}">
            <div style="flex:1;">
                <span>${t.descricao}<br><small>${dataFormatada}</small></span>
            </div>
            <div style="text-align:right; margin-right: 10px;"><b class="dash-val">${format(t.valor)}</b></div>
            <div class="transacao-actions">
                <button class="btn-edit" onclick="abrirEdicao(${JSON.stringify(t).replace(/"/g, '&quot;')})">✏️</button>
                <button class="btn-delete" onclick="deletarTransacao('${t.id}')">🗑️</button>
            </div>
        </div>`;
    });

    document.getElementById('resumoReceitas').innerText = format(tR);
    document.getElementById('resumoDespesas').innerText = format(tD);
    const saldo = tR - tD;
    document.getElementById('resumoSaldo').innerText = format(saldo);

    // Atualizar meta cumulativa
    const mesInicio = document.getElementById('mesInicio').value;
    const mesFim = document.getElementById('mesFim').value;
    let metaCumulativa = 0;
    
    if(mesInicio) {
        const dataInicio = new Date(mesInicio + '-01');
        const dataFim = mesFim ? new Date(mesFim + '-01') : dataInicio;
        
        for(let d = new Date(dataInicio); d <= dataFim; d.setMonth(d.getMonth() + 1)) {
            const mesStr = d.toISOString().slice(0, 7);
            if(nuvemMetas[mesStr]) {
                metaCumulativa += nuvemMetas[mesStr];
            }
        }
    }

    if(metaCumulativa > 0) {
        document.getElementById('metaAtual').innerText = `Meta: ${format(metaCumulativa)}`;
    } else {
        document.getElementById('metaAtual').innerText = '';
    }

    // Atualizar status da meta
    const mesAtual = document.getElementById('mesInicio').value;
    if(mesAtual && nuvemMetas[mesAtual]) {
        const metaDiv = document.getElementById('metaStatus');
        const meta = metaCumulativa > 0 ? metaCumulativa : nuvemMetas[mesAtual];
        const status = saldo >= meta ? '✅ Meta atingida!' : `❌ Faltam ${format(meta - saldo)}`;
        metaDiv.innerText = status;
    }
}

// ===== GRÁFICOS =====
function desenharGraficos() {
    const s = document.getElementById('mesInicioGraf').value;
    const e = document.getElementById('mesFimGraf').value;
    
    const dados = transacoes.filter(t => {
        let d = t.data.slice(0, 7);
        return (!s || d >= s) && (!e || d <= e);
    });
    
    // Gráfico 1: Balanço Mensal
    let porMes = {};
    dados.forEach(t => {
        const mes = t.data.slice(0, 7);
        if(!porMes[mes]) porMes[mes] = {receita: 0, despesa: 0};
        if(t.tipo === 'receita') porMes[mes].receita += t.valor;
        else porMes[mes].despesa += t.valor;
    });

    const meses = Object.keys(porMes).sort();
    const receitas = meses.map(m => porMes[m].receita);
    const despesas = meses.map(m => porMes[m].despesa);

    const ctx1 = document.getElementById('grafico1');
    if(charts.bar) charts.bar.destroy();
    
    charts.bar = new Chart(ctx1, {
        type: 'bar',
        data: {
            labels: meses.map(m => {
                const [a, me] = m.split('-');
                return new Date(a, me-1).toLocaleDateString('pt-BR', {month: 'short', year: '2-digit'});
            }),
            datasets: [
                {
                    label: 'Receitas',
                    data: receitas,
                    backgroundColor: 'rgba(16, 185, 129, 0.7)',
                    borderColor: 'var(--accent-green)',
                    borderWidth: 2
                },
                {
                    label: 'Despesas',
                    data: despesas,
                    backgroundColor: 'rgba(244, 63, 94, 0.7)',
                    borderColor: 'var(--accent-red)',
                    borderWidth: 2
                }
            ]
        },
        plugins: [ChartDataLabels],
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {labels: {color: 'var(--text-main)', font: {size: 14, weight: 'bold'}, padding: 15}},
                tooltip: {
                    callbacks: {label: (c) => format(c.parsed.y)},
                    backgroundColor: 'rgba(0,0,0,0.9)',
                    titleColor: 'var(--text-main)',
                    bodyColor: 'var(--text-main)',
                    padding: 12,
                    font: {size: 14, weight: 'bold'}
                },
                datalabels: {
                    color: 'var(--text-main)',
                    font: {weight: 'bold', size: 13},
                    formatter: (value) => value > 0 ? format(value) : '',
                    anchor: 'end',
                    align: 'top',
                    offset: 8
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        color: 'var(--text-muted)',
                        callback: (value) => format(value),
                        font: {size: 12, weight: 'bold'}
                    },
                    grid: {color: 'rgba(255,255,255,0.1)'}
                },
                x: {
                    ticks: {color: 'var(--text-muted)', font: {size: 11, weight: 'bold'}},
                    grid: {display: false}
                }
            }
        }
    });

    // Gráfico 2: Distribuição por Categoria
    let porCategoria = {};
    dados.forEach(t => {
        if(t.tipo === 'despesa') {
            porCategoria[t.categoria] = (porCategoria[t.categoria] || 0) + t.valor;
        }
    });

    const cores = ['#FF6600', '#f43f5e', '#10b981', '#3b82f6', '#a78bfa', '#f97316'];
    const ctx2 = document.getElementById('grafico2');
    if(charts.doughnut) charts.doughnut.destroy();
    
    charts.doughnut = new Chart(ctx2, {
        type: 'doughnut',
        data: {
            labels: Object.keys(porCategoria),
            datasets: [{
                data: Object.values(porCategoria),
                backgroundColor: cores.slice(0, Object.keys(porCategoria).length),
                borderColor: '#111111',
                borderWidth: 2
            }]
        },
        plugins: [ChartDataLabels],
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: {color: 'var(--text-main)', font: {size: 13, weight: 'bold'}, padding: 15}
                },
                tooltip: {
                    callbacks: {label: (c) => format(c.parsed)},
                    backgroundColor: 'rgba(0,0,0,0.9)',
                    titleColor: 'var(--text-main)',
                    bodyColor: 'var(--text-main)',
                    padding: 12,
                    font: {size: 14, weight: 'bold'}
                },
                datalabels: {
                    color: 'var(--text-main)',
                    font: {weight: 'bold', size: 13},
                    formatter: (value) => value > 0 ? format(value) : '',
                    anchor: 'center',
                    align: 'center'
                }
            }
        }
    });
}

// ===== TROCAR ABA =====
function trocarAba(aba, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(aba).classList.remove('hidden');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');

    if(aba === 'home') {
        document.getElementById('btnPrivacy').style.display = 'block';
    } else {
        document.getElementById('btnPrivacy').style.display = 'none';
    }

    if(aba === 'graficos') {
        setTimeout(() => desenharGraficos(), 100);
    }
}

// ===== RENDERIZAR CONFIGS =====
function renderConfigs() {
    const sc = document.getElementById('conta'), scat = document.getElementById('categoria');
    const esc = document.getElementById('editConta'), escat = document.getElementById('editCategoria');
    
    sc.innerHTML = ''; scat.innerHTML = '';
    if(esc) esc.innerHTML = '';
    if(escat) escat.innerHTML = '';
    
    contas.forEach(c => {
        const opt = `${c.nome} (${c.tipo})`;
        sc.add(new Option(opt, opt));
        if(esc) esc.add(new Option(opt, opt));
    });
    categorias.forEach(c => {
        scat.add(new Option(c, c));
        if(escat) escat.add(new Option(c, c));
    });

    // Renderizar lista de contas
    const listContas = document.getElementById('listaAdminContas');
    listContas.innerHTML = contas.map((c, i) => 
        `<div style="display:flex; justify-content:space-between; padding:8px; background:#1a1a1a; border-radius:8px; margin:5px 0;">
            <span>${c.nome} (${c.tipo})</span>
            <button class="btn-delete" style="width:60px; height:32px;" onclick="removerConta(${i})">❌</button>
        </div>`
    ).join('');

    // Renderizar lista de categorias
    const listCat = document.getElementById('listaAdminCategorias');
    listCat.innerHTML = categorias.map((c, i) => 
        `<div style="display:flex; justify-content:space-between; padding:8px; background:#1a1a1a; border-radius:8px; margin:5px 0;">
            <span>${c}</span>
            <button class="btn-delete" style="width:60px; height:32px;" onclick="removerCategoria(${i})">❌</button>
        </div>`
    ).join('');
}

function removerConta(index) {
    contas.splice(index, 1);
    localStorage.setItem('contas', JSON.stringify(contas));
    renderConfigs();
    atualizar();
}

function removerCategoria(index) {
    categorias.splice(index, 1);
    localStorage.setItem('categorias', JSON.stringify(categorias));
    renderConfigs();
}

// ===== FUNÇÕES AUXILIARES =====
function format(v) {
    return Number(v).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
}

function parseMoeda(v) {
    return Number(v.replace(/\D/g, ''))/100;
}

function filtrar(arr) {
    const s = document.getElementById('mesInicio').value;
    const e = document.getElementById('mesFim').value;
    return arr.filter(t => {
        let d = t.data.slice(0, 7);
        return (!s || d >= s) && (!e || d <= e);
    });
}

function togglePrivacidade() {
    document.querySelectorAll('.dash-val').forEach(v => v.classList.toggle('blur-active'));
}

// ===== FORMATAÇÃO DE INPUT =====
document.getElementById('valor').oninput = e => {
    let v = e.target.value.replace(/\D/g, '');
    e.target.value = (v/100).toFixed(2).replace('.', ',');
};

document.getElementById('metaValor').oninput = e => {
    let v = e.target.value.replace(/\D/g, '');
    e.target.value = (v/100).toFixed(2).replace('.', ',');
};

if(document.getElementById('editValor')) {
    document.getElementById('editValor').oninput = e => {
        let v = e.target.value.replace(/\D/g, '');
        e.target.value = (v/100).toFixed(2).replace('.', ',');
    };
}

// Definir data atual como padrão
document.getElementById('data').valueAsDate = new Date();

// Fechar modal ao clicar fora
window.onclick = (e) => {
    const modal = document.getElementById('editModal');
    const modalP = document.getElementById('modalParcelas');
    if(e.target === modal) {
        fecharModal();
    }
    if(e.target === modalP) {
        fecharModalParcelas();
    }
};
